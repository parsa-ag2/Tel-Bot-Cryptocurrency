<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="menu">


<h2>
📈 Market Bot

<div id="home" class="page">

<button class="gray">

</button>


</div>




<!-- بازارها -->

<div id="markets" class="page hidden">


<button class="gold" onclick="crypto()">

</button>

<!-- کالاها -->

</button>


<button class="yellow">

</button>

</button>


<button class="red">
